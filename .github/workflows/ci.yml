name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-and-test:
    strategy:
      matrix:
        # Project is Linux/Ubuntu only (see README / CLAUDE.md).
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev,ui,cirq]

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest
