# Solver and experiment configuration
n_instances: 1
solver: cirq  # cudaq | cirq | simulated_annealing
formulation: tqudo  # qubo | tqudo (native qudits, Cirq/SA only) | tqudo_virtual (qubit emulation, Cirq/CUDA-Q)
optimizer: Powell  # COBYLA | Powell | L-BFGS-B | SLSQP | Nelder-Mead
restriction:
  lambda_0: 1000.0 # TODO
  lambda_1: 1000.0  # TODO
  lambda_2: 1000.0  # TODO
qaoa_depth: 1
qaoa_max_iter: 1000
qaoa_delta_t: 0.55 # TQA initial gamma/beta scale (see utils.qaoa_helpers.tqa_init_params), taken from Sack et al. 2021 delta for random graphs
qaoa_optimizer_tol: 1.0e-6 # SciPy minimize stopping tolerance for QAOA angles
qaoa_shots: 100000  # shots per objective evaluation for sampling-based QAOA
qaoa_sample_shots: 100000  # shots for final solution sampling in QAOA backends
seed: 42
max_iterations: 1000
timeout_seconds: null
# Simulated annealing parameters
sa_t_initial: 1000.0 # Starting temperature
sa_t_final: 1.0e-6 # Stopping temperature threshold
sa_alpha: 0.95 # Geometric cooling factor, recommended to be in intervals between 0.5 and 0.99; and 0.9 and 0.98 (A theoretical study on the behavior of simulated annealing leading to a new cooling schedule) (Best Practices for Simulated Annealing in Multiprocessor Task Distribution Problems )
# Noise simulation (optional, disabled by default)
noise:
  enabled: false
  noise_type: depolarizing  # depolarizing | amplitude_damping | phase_damping | bit_flip | phase_flip
  probability: 0.01
  # gate_noise:  # optional per-gate probability overrides
  #   x: 0.02
  #   h: 0.005
