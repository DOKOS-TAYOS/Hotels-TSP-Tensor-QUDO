<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Curvas de energía agregadas (QAOA) para Hotel TSP — Tensor-QUDO y QUBO."
    />
    <title>Curvas de energía — Hotel TSP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="wrap">
      <nav id="site-nav" aria-label="Principal"></nav>
      <header class="site-header">
        <h1>Curvas de energía agregadas</h1>
        <p class="lede">Fuente: <code>processed/energy_curves_agg.csv</code></p>
        <p class="header-context">
          Medianas agregadas del objetivo (QUBO o Tensor-QUDO normalizado) a lo largo de capas QAOA
          o pasos equivalentes: sirve para comparar la convergencia entre solvers y formulaciones
          sobre el mismo pipeline experimental.
        </p>
      </header>
      <p id="curves-error" class="status-bad"></p>
      <div class="chart-box tall">
        <canvas id="chart-curves" aria-label="Curvas p50"></canvas>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script type="module" src="js/nav.js"></script>
    <script type="module" src="js/curves.js"></script>
  </body>
</html>
