<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Tasas de factibilidad y resumen por solver y formulación (Hotel TSP / Tensor-QUDO)."
    />
    <title>Resumen por configuración — Hotel TSP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/tabulator-tables@6.2.5/dist/css/tabulator.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="wrap">
      <nav id="site-nav" aria-label="Principal"></nav>
      <header class="site-header">
        <h1>Resumen por configuración</h1>
        <p class="lede">Fuente: <code>processed/summary_by_config.csv</code></p>
        <p class="header-context">
          Vista agregada del experimento: factibilidad de rutas frente a restricciones de precedencia,
          comparando pares solver × formulación (QUBO vs Tensor-QUDO) y tamaño de instancia.
        </p>
      </header>
      <p id="summary-error" class="status-bad"></p>
      <div class="chart-box tall">
        <canvas id="chart-feas" aria-label="Gráfico feas_rate"></canvas>
      </div>
      <div id="table-summary" class="table-host"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/tabulator-tables@6.2.5/dist/js/tabulator.min.js"></script>
    <script type="module" src="js/nav.js"></script>
    <script type="module" src="js/summary.js"></script>
  </body>
</html>
