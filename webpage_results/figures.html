<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Figuras matplotlib del análisis: energía y comparativas (Hotel TSP)."
    />
    <title>Figuras — Hotel TSP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="wrap">
      <nav id="site-nav" aria-label="Principal"></nav>
      <header class="site-header">
        <h1>Figuras del análisis</h1>
        <p class="lede">Generadas por <code>data_analysis.plot</code> en <code>output/images/</code></p>
        <p class="header-context">
          Visualizaciones listas para informes y artículos: contrastan configuraciones experimentales
          sobre el mismo conjunto de instancias y métricas derivadas del manifest.
        </p>
      </header>
      <div class="figure-grid">
        <figure>
          <img id="img-energy" alt="" />
          <figcaption data-for="img-energy" class="muted">Cargando…</figcaption>
        </figure>
        <figure>
          <img id="img-energy-cirq-cuda" alt="" />
          <figcaption data-for="img-energy-cirq-cuda" class="muted">Cargando…</figcaption>
        </figure>
        <figure>
          <img id="img-energy-cirq-n" alt="" />
          <figcaption data-for="img-energy-cirq-n" class="muted">Cargando…</figcaption>
        </figure>
      </div>
    </div>
    <script type="module" src="js/nav.js"></script>
    <script type="module" src="js/figures.js"></script>
  </body>
</html>
